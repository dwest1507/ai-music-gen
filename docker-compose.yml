services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ACESTEP_API_URL=${ACESTEP_API_URL}
      - ACESTEP_API_KEY=${ACESTEP_API_KEY}
      - FRONTEND_URL=http://localhost:3000
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - ./backend:/app # Hot reload for development

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
